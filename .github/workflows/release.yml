name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    uses: ./.github/workflows/build-windows.yml
  build-linux:
    uses: ./.github/workflows/build-linux.yml
  build-macos:
    uses: ./.github/workflows/build-macos.yml

  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: LocoDrive-Windows-Installer
          path: release-artifacts/windows
          
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: LocoDrive-Linux-Installer
          path: release-artifacts/linux
          
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: LocoDrive-macOS-Installer
          path: release-artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/windows/*
            release-artifacts/linux/*
            release-artifacts/macos/*
          draft: false
          prerelease: false
