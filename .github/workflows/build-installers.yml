name: Build Native Installers

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Trigger release when pushing tags like v1.0.0
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-20.04
          - os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GraalVM via Gluon
      uses: gluonhq/setup-graalvm@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        graalvm: '22.1.0.1-Final'
        jdk: 'java17'

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl1-mesa-dev libgtk-3-dev libpango1.0-dev libxtst-dev

    - name: Setup MSVC (Windows only)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile Native Machine Code and Package Installer
      run: mvn clean gluonfx:build gluonfx:package
      
    - name: Copy Installer to Dist
      run: |
        mkdir -p dist
        # Gluon outputs packages in target/gluonfx/{arch}-{os}/
        find target/gluonfx/ -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.pkg" -o -name "*.dmg" -o -name "*.deb" \) -exec cp {} dist/ \;
      shell: bash

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocoDrive-${{ runner.os }}-NativeInstaller
        path: dist/*

    - name: Publish to GitHub Release
      uses: ncipollo/release-action@v1
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag: latest
        name: "Latest Build"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        artifacts: "dist/*.*"
        token: ${{ secrets.GITHUB_TOKEN }}
