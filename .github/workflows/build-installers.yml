name: Build Native Installers

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            jpackage-type: exe
          - os: ubuntu-latest
            jpackage-type: deb
          - os: macos-latest
            jpackage-type: pkg

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Fat JAR with Maven
      # This step creates an OS-specific fat JAR because the OpenJFX Maven dependencies 
      # automatically pull the correct binaries for the current runner's OS.
      run: mvn clean package -DskipTests

    - name: Package Native Installer with jpackage
      run: |
        # Create a clean input directory to avoid packaging unnecessary files from target/
        mkdir jpackage-input
        cp target/locodrive-1.0.0.jar jpackage-input/
        
        jpackage --type ${{ matrix.jpackage-type }} \
                 --name LocoDriveServer \
                 --input jpackage-input/ \
                 --main-jar locodrive-1.0.0.jar \
                 --main-class com.locodrive.Launcher \
                 --app-version 1.0.0 \
                 --java-options "-Dapple.awt.UIElement=false" \
                 --java-options "-Djavafx.macos.interop=true" \
                 --java-options "--add-opens=java.desktop/sun.awt=ALL-UNNAMED" \
                 --java-options "--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED" \
                 --java-options "--add-exports=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" \
                 --dest dist/
      shell: bash

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocoDriveServer-${{ runner.os }}-Installer
        path: dist/*.*
