name: Build Tauri Installers

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
            arch: aarch64
          - os: macos-13
            platform: macos
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build headless Java server JAR
        run: mvn clean package -DskipTests
        
      - name: Prepare sidecar resource
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          cp target/locodrive-server.jar src-tauri/resources/locodrive-server.jar

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}"
          releaseName: "LocoDrive ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}"
          releaseBody: 'Automated build. Download the installer for your OS below.'
          releaseDraft: false
          prerelease: false
