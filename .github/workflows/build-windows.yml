name: Build Windows Native

on:
  workflow_call:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GraalVM via Gluon
      uses: gluonhq/setup-graalvm@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        graalvm: '22.1.0.1-Final'
        jdk: 'java17'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile Native Machine Code
      run: mvn -B clean gluonfx:build

    - name: Verify Binary Exists
      run: |
        $Binary = Get-ChildItem -Path "target\gluonfx" -Recurse -Include "*.exe" | Where-Object { $_.Name -notmatch "java|graal" } | Select-Object -First 1
        if (-not $Binary) {
            Write-Error "Native binary not found!"
            exit 1
        }
        $sizeMB = [math]::Round($Binary.Length / 1MB, 2)
        Write-Host "Native binary found: $($Binary.FullName) ($sizeMB MB)"
        mkdir build
        Copy-Item $Binary.FullName -Destination "build\locodrive.exe"
      shell: powershell

    - name: Package Installer (Inno Setup)
      run: iscc installer/windows/installer.iss

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocoDrive-Windows-Installer
        path: dist/LocoDrive-Setup.exe
