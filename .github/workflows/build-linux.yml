name: Build Linux Native

on:
  workflow_call:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GraalVM via Gluon
      uses: gluonhq/setup-graalvm@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        graalvm: '22.1.0.1-Final'
        jdk: 'java17'

    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl1-mesa-dev libgtk-3-dev libpango1.0-dev libxtst-dev

    - name: Compile Native Machine Code
      run: mvn -B clean gluonfx:build

    - name: Verify Binary Exists
      run: |
        BINARY=$(find target/gluonfx -type f -executable ! -name "*.so" ! -name "*.o" ! -name "*.a" | head -n 1)
        if [ -z "$BINARY" ]; then
            echo "❌ Native binary not found!"
            exit 1
        fi
        SIZE=$(du -h "$BINARY" | cut -f1)
        echo "✅ Native binary found: $BINARY ($SIZE)"

    - name: Package Installer (DEB)
      run: mvn -B gluonfx:package

    - name: Package Portable (AppImage)
      run: ./scripts/build-appimage.sh
      shell: bash

    - name: Copy DEB to dist
      run: |
        mkdir -p dist
        find target/gluonfx -type f -name "*.deb" -exec cp {} dist/ \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocoDrive-Linux-Installer
        path: dist/*
