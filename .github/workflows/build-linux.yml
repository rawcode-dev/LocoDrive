name: Build Linux Native

on:
  workflow_call:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GraalVM via Gluon
      uses: gluonhq/setup-graalvm@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        graalvm: '22.1.0.1-Final'
        jdk: 'java17'

    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl1-mesa-dev libgtk-3-dev libpango1.0-dev libxtst-dev xvfb

    - name: Compile Native Machine Code
      run: mvn clean gluonfx:build

    - name: Compress Binary with UPX
      uses: crazy-max/ghaction-upx@v3
      with:
        version: latest
        files: target/gluonfx/x86_64-linux/gvm/locodrive
        args: -9

    - name: Build Validation
      run: ./scripts/validate-build.sh
      shell: bash

    - name: Package Installer (DEB)
      run: mvn gluonfx:package
      
    - name: Package Portable (AppImage)
      run: ./scripts/build-appimage.sh
      shell: bash
      
    - name: Copy DEB to dist
      run: |
        mkdir -p dist
        find target/gluonfx -type f -name "*.deb" -exec cp {} dist/ \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocoDrive-Linux-Installer
        path: dist/*
